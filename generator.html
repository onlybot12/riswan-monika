<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Undangan Digital</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #7E57C2;
            --primary-light: #B39DDB;
            --primary-dark: #5E35B1;
            --accent: #FFB74D;
            --text: #333333;
            --text-light: #666666;
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --success: #4CAF50;
            --whatsapp: #25D366;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }
        
        .logo {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        .title {
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 400;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            padding: 30px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .form-label {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
            display: block;
        }
        
        .form-control {
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(126, 87, 194, 0.1);
        }
        
        .form-control[readonly] {
            background-color: #F5F5F5;
            color: var(--text-light);
        }
        
        .link-box {
            background: #F3E5F5;
            border: 2px dashed #D1C4E9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            color: var(--primary-dark);
            font-size: 0.9rem;
        }
        
        .btn-generate {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(126, 87, 194, 0.2);
        }
        
        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(126, 87, 194, 0.3);
        }
        
        .btn-generate:active {
            transform: translateY(0);
        }
        
        .preview-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .preview-title {
            color: var(--primary-dark);
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #F0F0F0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .preview-content {
            background: #FAFAFA;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.6;
            white-space: pre-wrap;
            font-size: 0.95rem;
            border: 1px solid #EEEEEE;
        }
        
        .share-section {
            margin-top: 25px;
        }
        
        .share-title {
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-share {
            border: none;
            border-radius: 50px;
            padding: 12px 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }
        
        .btn-share:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }
        
        .btn-whatsapp {
            background: var(--whatsapp);
            color: white;
        }
        
        .btn-facebook {
            background: #1877F2;
            color: white;
        }
        
        .btn-telegram {
            background: #0088CC;
            color: white;
        }
        
        .btn-twitter {
            background: #1DA1F2;
            color: white;
        }
        
        .btn-copy {
            background: var(--accent);
            color: var(--text);
        }
        
        .note-box {
            background: #E8F5E9;
            border-left: 4px solid var(--success);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 0.9rem;
            color: var(--text);
        }
        
        .note-box i {
            color: var(--success);
            margin-right: 8px;
        }
        
        .success-badge {
            display: inline-flex;
            align-items: center;
            background: #E8F5E9;
            color: var(--success);
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .success-badge i {
            margin-right: 8px;
        }
        
        .reset-btn {
            background: transparent;
            color: var(--text-light);
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            padding: 12px 20px;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .reset-btn:hover {
            background: #F5F5F5;
            color: var(--text);
        }
        
        /* Scrollbar styling */
        .preview-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .preview-content::-webkit-scrollbar-track {
            background: #F1F1F1;
            border-radius: 10px;
        }
        
        .preview-content::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;
        }
        
        .preview-content::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
        
        @media (max-width: 576px) {
            body {
                padding: 15px;
            }
            
            .card {
                padding: 25px 20px;
            }
            
            .share-buttons {
                flex-direction: column;
            }
            
            .btn-share {
                width: 100%;
                justify-content: center;
            }
            
            .preview-content {
                max-height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-gift"></i>
            </div>
            <h1 class="title">Generator Undangan Digital</h1>
        </div>
        
        <div class="card">
            <div class="form-group mb-4">
                <label class="form-label">Nama Pengantin</label>
                <input id="pengantin" type="text" class="form-control" readonly>
            </div>
            
            <div class="form-group mb-4">
                <label class="form-label">Nama Tamu</label>
                <input id="namaTamu" type="text" class="form-control" placeholder="Contoh: Budi Santoso atau Keluarga Budi Santoso">
            </div>
            
            <div class="form-group mb-4">
                <label class="form-label">Link Undangan</label>
                <div id="linkUndangan" class="link-box"></div>
            </div>
            
            <div class="note-box">
                <i class="fas fa-lightbulb"></i>
                <strong>Tip:</strong> Masukkan nama tamu, lalu klik tombol "Generate" di bawah. Undangan akan muncul dengan tombol untuk langsung dibagikan ke media sosial.
            </div>
            
            <button id="generateBtn" class="btn-generate" onclick="generateText()">
                <i class="fas fa-magic"></i> Generate Undangan
            </button>
        </div>
        
        <div id="previewSection" class="card preview-section">
            <div class="success-badge">
                <i class="fas fa-check-circle"></i> Undangan berhasil dibuat!
            </div>
            
            
            <div id="output" class="preview-content"></div>
            
            <div class="share-section">
                <h5 class="share-title">Bagikan Undangan</h5>
                <div class="share-buttons">
                    <button class="btn-share btn-whatsapp" onclick="shareToWhatsApp()">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </button>
                    <button class="btn-share btn-copy" onclick="copyText()">
                        <i class="far fa-copy"></i> Salin Teks
                    </button>
                </div>
            </div>
            
            <button class="reset-btn" onclick="resetForm()">
                <i class="fas fa-redo"></i> Buat Undangan Baru
            </button>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: none;">
        <div style="background: #333; color: white; padding: 15px 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; max-width: 300px;">
            <i id="toastIcon" style="font-size: 1.2rem;"></i>
            <span id="toastMessage"></span>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Inisialisasi variabel global
        let generatedText = '';
        let baseLink = '';
        let coupleName = '';
        
        // Fungsi untuk menampilkan notifikasi toast
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            
            toastMessage.textContent = message;
            
            // Atur ikon berdasarkan tipe pesan
            if (type === 'success') {
                toastIcon.className = 'fas fa-check-circle';
                toastIcon.style.color = '#4CAF50';
            } else if (type === 'error') {
                toastIcon.className = 'fas fa-exclamation-circle';
                toastIcon.style.color = '#F44336';
            } else {
                toastIcon.className = 'fas fa-info-circle';
                toastIcon.style.color = '#2196F3';
            }
            
            toast.style.display = 'block';
            
            // Sembunyikan toast setelah 3 detik
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        // Format nama pengantin: "firin-sihah" menjadi "Firin & Sihah"
        function formatPengantin(text) {
            return text
                .split('-')
                .map(kata => kata.charAt(0).toUpperCase() + kata.slice(1))
                .join(' & ');
        }
        
        // Format nama tamu: Kapital di awal setiap kata
        function capitalizeName(name) {
            return name
                .split(' ')
                .filter(Boolean)
                .map(kata => {
                    // Cek jika kata mengandung tanda hubung
                    if (kata.includes('-')) {
                        return kata.split('-')
                            .map(part => part.charAt(0).toUpperCase() + part.slice(1).toLowerCase())
                            .join('-');
                    }
                    return kata.charAt(0).toUpperCase() + kata.slice(1).toLowerCase();
                })
                .join(' ');
        }
        
        // Validasi input nama tamu
        function validateName(name) {
            if (!name.trim()) {
                showToast('Masukkan nama tamu terlebih dahulu', 'error');
                return false;
            }
            
            // Validasi panjang nama
            if (name.length > 60) {
                showToast('Nama terlalu panjang (maksimal 60 karakter)', 'error');
                return false;
            }
            
            return true;
        }
        
        // Inisialisasi saat halaman dimuat
        document.addEventListener('DOMContentLoaded', function() {
            // Ambil parameter dari URL
            const urlParams = new URLSearchParams(window.location.search);
           // let pengantinParam = urlParams.get('pengantin') || "monika-riswan";
            
            // Simpan nama pengantin untuk digunakan di fungsi lain
           // coupleName = formatPengantin(pengantinParam);
            
            // Tampilkan nama pengantin
            document.getElementById('pengantin').value = coupleName;
            
            // Buat link dasar
            baseLink = "https://monika-riswan.my.id";
            document.getElementById('linkUndangan').textContent = baseLink;
            
            // Tambahkan event listener untuk tombol Enter di input nama
            document.getElementById('namaTamu').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    generateText();
                }
            });
            
            // Fokus ke input nama tamu
            document.getElementById('namaTamu').focus();
        });
        
        // Fungsi untuk menghasilkan teks undangan
        function generateText() {
            const namaTamuInput = document.getElementById('namaTamu').value.trim();
            
            // Validasi input
            if (!validateName(namaTamuInput)) {
                return;
            }
            
            // Format nama tamu
            const namaTamu = capitalizeName(namaTamuInput);
            
            // Buat link undangan dengan parameter tamu
            const linkUndangan = baseLink + "?to=" + encodeURIComponent(namaTamu.replace(/\s+/g, '-').toLowerCase());
            
            // Template teks undangan yang lebih menarik
            generatedText = `Assalamu'alaikum Wr. Wb.
Bismillahirahmanirrahim.

*Kepada Yth:* *${namaTamu}*

Dengan memohon rahmat dan ridha Allah SWT, perkenankan kami mengundang Bapak/Ibu/Saudara/i, sahabat, serta keluarga tercinta untuk menghadiri acara pernikahan kami:

*Monika & Riswan*

Sebagai tanda syukur dan kebahagiaan, kami ingin berbagi momen spesial ini melalui undangan digital berikut:

*Link Undangan Digital:*
${linkUndangan}

Kehadiran serta doa restu Bapak/Ibu merupakan kebahagiaan dan kehormatan tersendiri bagi kami.

Mohon maaf jika undangan ini hanya disampaikan melalui pesan digital. Atas perhatian dan kesediaan Bapak/Ibu, kami mengucapkan terima kasih yang sebesar-besarnya.

Wassalamu'alaikum Warahmatullahi Wabarakatuh

*Hormat kami,*
*Monika & Riswan*`;
            
            // Tampilkan output
            const outputContainer = document.getElementById('output');
            outputContainer.textContent = generatedText;
            
            // Tampilkan preview section
            const previewSection = document.getElementById('previewSection');
            previewSection.style.display = 'block';
            
            // Scroll ke preview section
            previewSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            showToast('Undangan berhasil dibuat! Siap dibagikan', 'success');
        }
        
        // Fungsi untuk menyalin teks
        function copyText() {
            if (!generatedText) {
                showToast('Tidak ada teks untuk disalin', 'error');
                return;
            }
            
            navigator.clipboard.writeText(generatedText).then(() => {
                showToast('Teks undangan berhasil disalin!', 'success');
            }).catch(err => {
                console.error('Gagal menyalin teks: ', err);
                showToast('Gagal menyalin teks. Coba lagi.', 'error');
            });
        }
        
        // Fungsi untuk berbagi ke WhatsApp
        function shareToWhatsApp() {
            if (!generatedText) {
                showToast('Generate undangan terlebih dahulu', 'error');
                return;
            }
            
            const text = encodeURIComponent(generatedText);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
        
        // Fungsi untuk berbagi ke Facebook
        function shareToFacebook() {
            if (!generatedText) {
                showToast('Generate undangan terlebih dahulu', 'error');
                return;
            }
            
            const text = encodeURIComponent(generatedText);
            const url = encodeURIComponent(baseLink);
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`, '_blank');
        }
        
        // Fungsi untuk berbagi ke Telegram
        function shareToTelegram() {
            if (!generatedText) {
                showToast('Generate undangan terlebih dahulu', 'error');
                return;
            }
            
            const text = encodeURIComponent(generatedText);
            window.open(`https://t.me/share/url?url=${baseLink}&text=${text}`, '_blank');
        }
        
        // Fungsi untuk berbagi ke Twitter
        function shareToTwitter() {
            if (!generatedText) {
                showToast('Generate undangan terlebih dahulu', 'error');
                return;
            }
            
            const text = encodeURIComponent(`Undangan pernikahan ${coupleName}. ${generatedText.substring(0, 100)}...`);
            window.open(`https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(baseLink)}`, '_blank');
        }
        
        // Fungsi untuk reset form
        function resetForm() {
            document.getElementById('namaTamu').value = "";
            document.getElementById('output').textContent = "";
            document.getElementById('previewSection').style.display = 'none';
            document.getElementById('namaTamu').focus();
            
            // Scroll ke atas
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            showToast('Form telah direset. Silakan buat undangan baru.', 'info');
        }
    </script>
</body>
</html>
